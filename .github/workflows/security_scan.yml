name: Security Scan

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security:
    name: Run Bandit & pip-audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.11

      - name: Install Dependencies
        run: uv sync --all-extras --dev

      - name: Run Bandit (Code Scanning)
        run: uvx bandit -r src/

      - name: Run pip-audit (Dependency Scanning)
        run: uv pip compile pyproject.toml | uvx pip-audit -r /dev/stdin
